<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aqua Rejuvé — Opening Soon</title>
  <meta name="description" content="Aqua Rejuvé — premium hydromassage and Charcot shower therapy. Opening soon in Mountain View, CA.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #E4EDEC;
      color: #565959;
      font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 520px;
    }
    .wave-icon {
      width: 64px;
      height: 30px;
      color: #565959;
      margin: 0 auto 28px;
    }
    h1 {
      font-family: 'Cormorant Unicase', Georgia, serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 400;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 0.75rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 40px;
      opacity: 0.7;
    }
    .opening {
      font-family: 'Cormorant Unicase', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .location {
      font-size: 0.85rem;
      font-weight: 300;
      opacity: 0.6;
      margin-bottom: 40px;
    }
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(86, 89, 89, 0.25);
      color: #565959;
      text-decoration: none;
      transition: 0.3s ease;
    }
    .socials a:hover {
      border-color: #565959;
      background: rgba(86, 89, 89, 0.08);
    }
    .socials svg {
      width: 18px;
      height: 18px;
    }
    .subscribe {
      margin-bottom: 32px;
    }
    .subscribe p {
      font-size: 0.8rem;
      font-weight: 300;
      opacity: 0.6;
      margin-bottom: 14px;
    }
    .subscribe-form {
      display: flex;
      gap: 8px;
      max-width: 380px;
      margin: 0 auto;
    }
    .subscribe-form input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(86, 89, 89, 0.25);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.5);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      color: #565959;
      outline: none;
      transition: 0.3s ease;
    }
    .subscribe-form input:focus {
      border-color: #565959;
      background: rgba(255, 255, 255, 0.8);
    }
    .subscribe-form input::placeholder {
      color: rgba(86, 89, 89, 0.4);
    }
    .subscribe-form button {
      padding: 12px 24px;
      background: #565959;
      color: #FBFAF7;
      border: none;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: 0.3s ease;
      white-space: nowrap;
    }
    .subscribe-form button:hover {
      background: #3d4545;
    }
    .subscribe-msg {
      font-size: 0.8rem;
      margin-top: 10px;
      font-weight: 400;
      display: none;
    }
    .email {
      font-size: 0.85rem;
      font-weight: 300;
    }
    .email a {
      color: #565959;
      text-decoration: none;
      border-bottom: 1px solid rgba(86, 89, 89, 0.3);
    }
    .email a:hover {
      border-color: #565959;
    }
    @media (max-width: 480px) {
      .subscribe-form {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="wave-icon" viewBox="0 0 50 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 3 Q8 -2 14 3 Q20 8 26 3 Q32 -2 38 3 Q44 8 48 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M2 11 Q8 6 14 11 Q20 16 26 11 Q32 6 38 11 Q44 16 48 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M2 19 Q8 14 14 19 Q20 24 26 19 Q32 14 38 19 Q44 24 48 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
    <h1>Aqua Rejuvé</h1>
    <p class="tagline">Hydro Massage</p>
    <p class="opening">Opening Soon</p>
    <p class="location">Mountain View, CA</p>
    <div class="subscribe">
      <p>Stay connected — only important updates and exclusive offers</p>
      <form class="subscribe-form" id="subscribe-form">
        <input type="email" placeholder="Your email" required>
        <button type="submit">Join the List</button>
      </form>
      <p class="subscribe-msg" id="subscribe-msg"></p>
    </div>
    <div class="socials">
      <a href="https://instagram.com/aquarejuve/" target="_blank" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
      <a href="https://facebook.com/aquarejuve" target="_blank" aria-label="Facebook">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
      </a>
    </div>
    <p class="email"><a href="mailto:contact@aquarejuve.com">contact@aquarejuve.com</a></p>
  </div>
  <script>
    document.getElementById('subscribe-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = this.querySelector('input').value;
      var btn = this.querySelector('button');
      var msg = document.getElementById('subscribe-msg');
      btn.textContent = '...';
      btn.disabled = true;
      fetch('https://script.google.com/macros/s/AKfycbw87FmBl_PERoDJhcDbjmqH8cOoblfzFED2w878rMIOwTXuaWYb7JIVNU01SIVlCrWq/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      }).then(function() {
        msg.textContent = 'Thank you! You\'re on the list.';
        msg.style.display = 'block';
        btn.textContent = 'Joined';
      }).catch(function() {
        msg.textContent = 'Something went wrong. Please try again.';
        msg.style.display = 'block';
        btn.textContent = 'Join the List';
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
